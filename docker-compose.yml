# local development stack only
# prod deployment handled separately through AWS infrastructure
services:
  nginx:
    build:
      context: ./nginx
    container_name: peerprep-nginx
    ports:
      - '${NGINX_PORT:-8080}:80'
    depends_on:
      - user-service
      - question-service
      - matching-service
      - collaboration-service
    networks:
      - peerprep-network

  user-service:
    build:
      context: ./services/user-service
      target: dev
    container_name: peerprep-user-service
    ports:
      - '${USER_SERVICE_PORT:-3001}:3001'
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - ./services/user-service:/app
      - /app/node_modules
    networks:
      - peerprep-network
    command: npm run dev

  question-service:
    build:
      context: ./services/question-service
      target: dev
    container_name: peerprep-question-service
    ports:
      - '${QUESTION_SERVICE_PORT:-3002}:3002'
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - PORT=3002
      - NODE_ENV=development
    volumes:
      - ./services/question-service:/app
      - /app/node_modules
    networks:
      - peerprep-network
    command: npm run dev

  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
      target: dev
    container_name: peerprep-matching-service
    ports:
      - '${MATCHING_SERVICE_PORT:-3003}:3003'
    environment:
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - PORT=3003
      - QUESTION_SERVICE_URL=http://question-service:3002
      - NODE_ENV=development
      - MATCHING_TIMEOUT_MS=30000
      - LOG_LEVEL=debug
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://user:root@rabbitmq:5672}
    volumes:
      - ./services/matching-service:/repo/services/matching-service
      - ./shared:/repo/shared
      - /repo/services/matching-service/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - peerprep-network
    command: npm run dev

  collaboration-service:
    build:
      context: ./services/collaboration-service
      target: dev
    container_name: peerprep-collaboration-service
    ports:
      - '${COLLAB_SERVICE_PORT:-3004}:3004'
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - PORT=3004
      - FRONTEND_ORIGIN=${COLLAB_FRONTEND_ORIGIN:-http://localhost:5173}
      - PUBLIC_WS_URL=${COLLAB_PUBLIC_WS_URL:-http://localhost:3004}
      - GRACE_PERIOD_MS=${COLLAB_GRACE_PERIOD_MS:-30000}
      - JOIN_TOKEN_TTL_MS=${COLLAB_JOIN_TOKEN_TTL_MS:-300000}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://user:root@rabbitmq:5672}
      - RABBITMQ_MATCH_FOUND_EXCHANGE=${RABBITMQ_MATCH_FOUND_EXCHANGE:-peerprep}
      - RABBITMQ_MATCH_FOUND_QUEUE=${RABBITMQ_MATCH_FOUND_QUEUE:-collaboration.match-found}
      - RABBITMQ_MATCH_FOUND_ROUTING_KEY=${RABBITMQ_MATCH_FOUND_ROUTING_KEY:-match.found}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=development
    volumes:
      - ./services/collaboration-service:/app
      - /app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - peerprep-network
    command: npm run dev

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - '15672:15672'
      - '5672:5672'
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: root
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - peerprep-network
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - '-q'
        - ping
      retries: 3
      timeout: 5s
      interval: 30s

volumes:
  rabbitmq_data:
    driver: local

networks:
  peerprep-network:
    driver: bridge
