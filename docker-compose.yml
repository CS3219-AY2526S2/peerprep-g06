services:
  matching-service:
    build: ./services/matching-service
    container_name: peerprep-matching-service
    ports:
      - '${MATCHING_SERVICE_PORT:-3002}:${MATCHING_SERVICE_PORT:-3002}'
    environment:
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - MATCHING_SERVICE_PORT=${MATCHING_SERVICE_PORT:-3002}
      - NODE_ENV=development
      - MATCHING_TIMEOUT=3000
      - LOG_LEVEL=debug
    volumes:
      - ./services/matching-service:/app
      - /app/node_modules
    networks:
      - peerprep-network
    command: npm run dev

  collaboration-service:
    build: ./services/collaboration-service
    container_name: peerprep-collaboration-service
    ports:
      - '${COLLAB_SERVICE_PORT:-3004}:${COLLAB_SERVICE_PORT:-3004}'
    environment:
      - COLLAB_SERVICE_PORT=${COLLAB_SERVICE_PORT:-3004}
      - COLLAB_FRONTEND_ORIGIN=${COLLAB_FRONTEND_ORIGIN:-http://localhost:8080}
      - COLLAB_GRACE_PERIOD_MS=${COLLAB_GRACE_PERIOD_MS:-30000}
      - COLLAB_JOIN_TOKEN_TTL_MS=${COLLAB_JOIN_TOKEN_TTL_MS:-300000}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
      - RABBITMQ_MATCH_FOUND_EXCHANGE=${RABBITMQ_MATCH_FOUND_EXCHANGE:-peerprep.matching}
      - RABBITMQ_MATCH_FOUND_QUEUE=${RABBITMQ_MATCH_FOUND_QUEUE:-collaboration.match-found}
      - RABBITMQ_MATCH_FOUND_ROUTING_KEY=${RABBITMQ_MATCH_FOUND_ROUTING_KEY:-match.found}
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - LOG_LEVEL=debug
    volumes:
      - ./services/collaboration-service:/app
      - /app/node_modules
    depends_on:
      - rabbitmq
    networks:
      - peerprep-network
    command: npm run dev

  rabbitmq:
    image: rabbitmq:3-management
    container_name: peerprep-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - peerprep-network

networks:
  peerprep-network:
    driver: bridge
