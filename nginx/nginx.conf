worker_processes auto;

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream user_service {
        server user-service:3001;
    }

    upstream question_service {
        server question-service:3002;
    }

    upstream matching_service {
        server matching-service:3003;
    }

    upstream collaboration_service {
        server collaboration-service:3004;
    }

    server {
        listen 80;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /gateway/health {
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location = /users/health {
            proxy_pass http://user_service/health;
        }

        location ^~ /users {
            proxy_pass http://user_service;
        }

        location = /questions/health {
            proxy_pass http://question_service/health;
        }

        location ^~ /questions {
            proxy_pass http://question_service;
        }

        location ^~ /history {
            proxy_pass http://question_service;
        }

        location = /matching/health {
            proxy_pass http://matching_service/health;
        }

        location = /collaboration/health {
            proxy_pass http://collaboration_service/health;
        }

        location = /matching/socket.io {
            proxy_pass http://matching_service/socket.io;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }

        location ^~ /matching/socket.io/ {
            proxy_pass http://matching_service/socket.io/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }

        location = /collaboration/socket.io {
            proxy_pass http://collaboration_service/socket.io;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }

        location ^~ /collaboration/socket.io/ {
            proxy_pass http://collaboration_service/socket.io/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
    }
}
