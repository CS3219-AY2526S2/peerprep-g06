name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  packages:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            path: frontend
            lockfile: frontend/package-lock.json
            run_tests: false
            run_coverage: false
          - name: user-service
            path: services/user-service
            lockfile: services/user-service/package-lock.json
            run_tests: true
            run_coverage: true
          - name: question-service
            path: services/question-service
            lockfile: services/question-service/package-lock.json
            run_tests: true
            run_coverage: true
          - name: matching-service
            path: services/matching-service
            lockfile: services/matching-service/package-lock.json
            run_tests: true
            run_coverage: true
          - name: collaboration-service
            path: services/collaboration-service
            lockfile: services/collaboration-service/package-lock.json
            run_tests: false
            run_coverage: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Type check
        working-directory: ${{ matrix.path }}
        run: npm run typecheck

      - name: Run tests
        if: matrix.run_tests && !matrix.run_coverage
        working-directory: ${{ matrix.path }}
        run: npm test

      - name: Run tests with coverage
        if: matrix.run_coverage
        working-directory: ${{ matrix.path }}
        run: npm run test:coverage

      - name: Upload to Codecov
        if: matrix.run_coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.path }}/coverage/lcov.info
          flags: ${{ matrix.name }}
          fail_ci_if_error: true

      - name: Build package
        working-directory: ${{ matrix.path }}
        run: npm run build

  docker:
    name: Docker Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user-service
            context: services/user-service
          - name: question-service
            context: services/question-service
          - name: matching-service
            context: .
            dockerfile: services/matching-service/Dockerfile
          - name: collaboration-service
            context: .
            dockerfile: services/collaboration-service/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: false
          tags: local/${{ matrix.name }}:${{ github.sha }}
